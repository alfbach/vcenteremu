# vCenter Emulator — nginx reverse proxy with TLS
# Backend: uvicorn on 127.0.0.1:8182 (internal; public HTTP/HTTPS: 8181 / 9443)

upstream vcenteremu_backend {
    server 127.0.0.1:8182;
    keepalive 32;
}

server {
    listen 9443 ssl;
    listen [::]:9443 ssl;
    http2 on;
    server_name vcenteremu.local;

    ssl_certificate     /etc/vcenteremu/tls/cert.pem;
    ssl_certificate_key /etc/vcenteremu/tls/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    client_max_body_size 512m;

    location / {
        proxy_pass http://vcenteremu_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}

# HTTP → HTTPS redirect on port 8181
server {
    listen 8181;
    listen [::]:8181;
    server_name vcenteremu.local;
    return 301 https://$host:9443$request_uri;
}
