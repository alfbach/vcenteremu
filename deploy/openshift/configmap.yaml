apiVersion: v1
kind: ConfigMap
metadata:
  name: vcenteremu-config
  labels:
    app.kubernetes.io/name: vcenteremu
data:
  VCENTEREMU_HOST: "0.0.0.0"
  VCENTEREMU_PORT: "8080"
  VCENTEREMU_UPLOAD_DIR: "/var/lib/vcenteremu/uploads"
  VCENTEREMU_WORKERS: "1"
  VCENTEREMU_API_USERNAME: "administrator@vsphere.local"
  VCENTEREMU_VCENTER_NAME: "vcenteremu.apps.example.com"
  VCENTEREMU_MAX_UPLOAD_MB: "512"
  VCENTEREMU_SESSION_TTL_SECONDS: "3600"
