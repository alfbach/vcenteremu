apiVersion: apps/v1
kind: Deployment
metadata:
  name: vcenteremu
  labels:
    app.kubernetes.io/name: vcenteremu
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vcenteremu
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vcenteremu
    spec:
      containers:
        - name: vcenteremu
          image: vcenteremu:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8181
              protocol: TCP
          envFrom:
            - configMapRef:
                name: vcenteremu-config
            - secretRef:
                name: vcenteremu-secret
          volumeMounts:
            - name: uploads
              mountPath: /var/lib/vcenteremu/uploads
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: vcenteremu-uploads
